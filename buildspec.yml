version: 0.2

env:
  parameter-store:
    VITE_API_BASE_URL: "/plumbers/prod/api-url"
    VITE_AWS_LOCATION_API_KEY:    "/plumbers/prod/aws-location-key"
    VITE_AWS_LOCATION_REGION:     "/plumbers/prod/aws-location-region"
    VITE_AWS_LOCATION_INDEX:      "/plumbers/prod/aws-location-index"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci

  build:
    commands:
      - npm run build

  post_build:
    commands:
      - |
        aws s3 sync dist/ s3://$S3_BUCKET/ \
          --delete \
          --exclude "index.html" \
          --cache-control "public,max-age=31536000,immutable"
      - |
        aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
          --cache-control "no-cache,no-store,must-revalidate"
      - |
        if [ -n "$CF_DIST_ID" ]; then
          aws cloudfront create-invalidation --distribution-id $CF_DIST_ID --paths "/*"
        fi